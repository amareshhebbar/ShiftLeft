name: ShiftLeft scheduled check
on:
  workflow_dispatch:    # manual trigger only — no auto schedule until webhook URL is set

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ShiftLeft webhook
        env:
          WEBHOOK_URL: ${{ secrets.SHIFTLEFT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "SHIFTLEFT_WEBHOOK_URL secret not set — skipping webhook call."
            echo "Set it in GitHub → Settings → Secrets → Actions to enable scheduled runs."
            exit 0
          fi
          curl -s -X POST "$WEBHOOK_URL/webhook/scheduler" \
            -H "Content-Type: application/json" \
            -d '{"source": "github-actions"}'
